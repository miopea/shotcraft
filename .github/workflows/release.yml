name: Release

# Manual-trigger only. We don't publish on every push — releases are
# operator-driven via Changesets. To cut a release: ensure a
# `.changeset/*.md` file describes the bump, then run this workflow
# from the Actions tab (or `gh workflow run release.yml`).
#
# To go back to push-triggered: set up a PAT secret that has `repo`
# scope and use it for GITHUB_TOKEN (changesets/action@v1's PR
# creation needs more than the default GITHUB_TOKEN provides on
# private repos).
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: "release: version packages"
          title: "release: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Deploy to Azure

# Builds + deploys @shotcraft/web to Azure App Service Linux B1 (Node 22)
# on push to main. The docs are plain markdown in `docs/` — GitHub
# renders them, no separate site to deploy.
#
# Required repo secret:
#   AZURE_WEBAPP_PUBLISH_PROFILE — `az webapp deployment list-publishing-profiles -g bfg-solutions -n shotcraft-web --xml`

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-web:
    name: Deploy @shotcraft/web → App Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build @shotcraft/web
        run: pnpm --filter @shotcraft/web build
      - name: Stage deploy bundle
        # App Service needs a self-contained deploy directory with non-workspace
        # node_modules. Stage server/dist + dist/client + a minimal package.json
        # then `npm install --omit=dev` to materialize a clean node_modules.
        run: |
          set -euo pipefail
          DEPLOY="$RUNNER_TEMP/shotcraft-web-deploy"
          rm -rf "$DEPLOY" && mkdir -p "$DEPLOY/server" "$DEPLOY/dist"
          cp -r packages/web/server/dist "$DEPLOY/server/dist"
          cp -r packages/web/dist/client "$DEPLOY/dist/client"
          cat > "$DEPLOY/package.json" <<'EOF'
          {
            "name": "shotcraft-web-deploy",
            "version": "0.0.0",
            "private": true,
            "type": "module",
            "main": "server/dist/index.js",
            "scripts": { "start": "node server/dist/index.js" },
            "dependencies": { "express": "^5.0.0" },
            "engines": { "node": ">=20" }
          }
          EOF
          (cd "$DEPLOY" && npm install --omit=dev --silent)
          echo "DEPLOY_DIR=$DEPLOY" >> "$GITHUB_ENV"
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: shotcraft-web
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.DEPLOY_DIR }}

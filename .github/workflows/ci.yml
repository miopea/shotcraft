name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        # Snapshot tests in core + every template launch a real Chromium.
        # `pnpm install` doesn't trigger Playwright's browser download
        # because the install hook isn't on `allowBuilds`. Run via the
        # workspace package that actually depends on playwright (the
        # root has no `playwright` dep, so plain `pnpm exec` errors with
        # "Command playwright not found").
        run: pnpm --filter @shotcraft/web exec playwright install --with-deps chromium
      # `pnpm build` first because `examples/budgetbug` typechecks
      # against shotcraft's built typings (dist/), and template packages
      # build to dist/ that downstream consumers reference. If we
      # typecheck before build, those imports resolve to "Cannot find
      # module 'shotcraft'".
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

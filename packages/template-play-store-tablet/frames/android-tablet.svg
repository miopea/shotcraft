<?xml version="1.0" encoding="UTF-8"?>
<!--
  Generic Android tablet chassis silhouette — derived from
  marvelapp/devices.css (Apache-2.0). Simplified: chassis outline +
  screen aperture + small front-camera dot. No vendor branding.

  viewBox: 640 × 1024. Screen aperture: 600 × 960 at offset (20, 32).
  Bezels are evenly 3.125 % on every side — matches modern Android
  tablet form factors (Galaxy Tab S, Pixel Tab).
-->
<svg viewBox="0 0 640 1024" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="tablet-bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27272a" />
      <stop offset="50%" stop-color="#08080a" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    <mask id="tablet-screen-cutout">
      <rect x="0" y="0" width="640" height="1024" rx="28" ry="28" fill="white" />
      <rect x="20" y="32" width="600" height="960" rx="18" ry="18" fill="black" />
    </mask>
  </defs>

  <rect
    x="0"
    y="0"
    width="640"
    height="1024"
    rx="28"
    ry="28"
    fill="url(#tablet-bezel)"
    mask="url(#tablet-screen-cutout)"
  />

  <!-- Outer chassis highlight -->
  <rect
    x="1"
    y="1"
    width="638"
    height="1022"
    rx="27"
    ry="27"
    fill="none"
    stroke="rgba(255, 255, 255, 0.07)"
    stroke-width="1.5"
  />

  <!-- Inner screen-edge shadow -->
  <rect
    x="20"
    y="32"
    width="600"
    height="960"
    rx="18"
    ry="18"
    fill="none"
    stroke="rgba(0, 0, 0, 0.5)"
    stroke-width="1.5"
  />

  <!-- Front camera dot in the upper bezel. -->
  <circle cx="320" cy="16" r="4" fill="#000" stroke="rgba(255,255,255,0.18)" stroke-width="0.6" />
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pixel-style Android phone chassis silhouette — derived from
  marvelapp/devices.css (Apache-2.0). Simplified: chassis outline,
  screen aperture, punch-hole front camera. No Google branding.

  viewBox: 380 × 680 (matches the captured raw's 9:16 aspect at dpr-3
  reduction). Screen aperture: 360 × 640 at offset (10, 20).
-->
<svg viewBox="0 0 380 680" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="pixel-bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27272a" />
      <stop offset="50%" stop-color="#08080a" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    <mask id="pixel-screen-cutout">
      <rect x="0" y="0" width="380" height="680" rx="44" ry="44" fill="white" />
      <rect x="10" y="20" width="360" height="640" rx="32" ry="32" fill="black" />
    </mask>
  </defs>

  <rect
    x="0"
    y="0"
    width="380"
    height="680"
    rx="44"
    ry="44"
    fill="url(#pixel-bezel)"
    mask="url(#pixel-screen-cutout)"
  />

  <!-- Outer chassis highlight -->
  <rect
    x="1"
    y="1"
    width="378"
    height="678"
    rx="43"
    ry="43"
    fill="none"
    stroke="rgba(255, 255, 255, 0.08)"
    stroke-width="1.5"
  />

  <!-- Inner screen-edge shadow -->
  <rect
    x="10"
    y="20"
    width="360"
    height="640"
    rx="32"
    ry="32"
    fill="none"
    stroke="rgba(0, 0, 0, 0.55)"
    stroke-width="1.5"
  />

  <!-- Punch-hole front camera, centered near top of screen aperture. -->
  <circle cx="190" cy="42" r="9" fill="#000" stroke="rgba(255,255,255,0.18)" stroke-width="0.8" />
</svg>

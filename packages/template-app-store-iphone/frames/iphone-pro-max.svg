<?xml version="1.0" encoding="UTF-8"?>
<!--
  iPhone Pro Max chassis silhouette — derived from marvelapp/devices.css
  (Apache-2.0; https://github.com/marvelapp/devices.css). Simplified to
  the elements Shotcraft needs: chassis outline, screen aperture, dynamic
  island. No Apple branding.

  viewBox: 470 × 1000 — chosen to roughly match the iPhone 14 Pro Max
  form factor (≈0.47 W:H) while leaving 20-unit bezels around a 430×960
  screen aperture (the wrapper.css `.screen-host` insets line up with
  these proportions).
-->
<svg viewBox="0 0 470 1000" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c2c30" />
      <stop offset="50%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#1a1a20" />
    </linearGradient>
    <mask id="screen-cutout">
      <rect x="0" y="0" width="470" height="1000" rx="80" ry="80" fill="white" />
      <rect x="20" y="20" width="430" height="960" rx="58" ry="58" fill="black" />
    </mask>
  </defs>

  <!-- Chassis bezel: gradient with screen punched out, so the captured image (z-index: 1) shows through. -->
  <rect
    x="0" y="0"
    width="470" height="1000"
    rx="80" ry="80"
    fill="url(#bezel)"
    mask="url(#screen-cutout)"
  />

  <!-- Subtle outer-edge highlight, for chassis depth. -->
  <rect
    x="1" y="1"
    width="468" height="998"
    rx="79" ry="79"
    fill="none"
    stroke="rgba(255, 255, 255, 0.08)"
    stroke-width="1.5"
  />

  <!-- Inner screen-edge shadow, for screen-bezel definition. -->
  <rect
    x="20" y="20"
    width="430" height="960"
    rx="58" ry="58"
    fill="none"
    stroke="rgba(0, 0, 0, 0.55)"
    stroke-width="1.5"
  />

  <!-- Dynamic island: dark pill near the top of the screen aperture. -->
  <rect
    x="160" y="44"
    width="150" height="38"
    rx="19" ry="19"
    fill="#000"
  />
</svg>

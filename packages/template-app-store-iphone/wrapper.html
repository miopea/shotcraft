<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Shotcraft — App Store iPhone 6.5"</title>
    <link rel="stylesheet" href="wrapper.css" />
  </head>
  <body data-theme="dark">
    <div class="canvas">
      <div class="caption-block">
        <h1 id="caption" class="caption"></h1>
        <p id="subtitle" class="subtitle"></p>
      </div>
      <div class="device-wrap">
        <div class="device">
          <div class="screen-host">
            <img id="screen" class="screen" alt="" />
          </div>
          <img class="frame" src="frames/iphone-pro-max.svg" alt="" />
        </div>
      </div>
    </div>
    <script>
      // Read URL params injected by Shotcraft's render runner and populate the
      // marketing layer. Once the captured screen image loads (or fails) we
      // set body.dataset.rendered so Shotcraft knows it's safe to screenshot.
      (function () {
        const params = new URLSearchParams(location.search);
        document.body.dataset.theme = params.get("theme") === "light" ? "light" : "dark";

        const captionText = params.get("caption") || "";
        document.getElementById("caption").textContent = captionText;

        const subtitleEl = document.getElementById("subtitle");
        const subtitle = params.get("subtitle");
        if (subtitle) {
          subtitleEl.textContent = subtitle;
        } else {
          subtitleEl.remove();
        }

        const img = document.getElementById("screen");
        const imageUrl = params.get("imageUrl");
        const finish = (state) => {
          document.body.dataset.rendered = state;
        };
        img.addEventListener("load", () => finish("true"));
        img.addEventListener("error", () => finish("error"));
        if (!imageUrl) {
          finish("error");
          return;
        }
        img.src = imageUrl;
      })();
    </script>
  </body>
</html>

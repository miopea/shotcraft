<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Shotcraft fontconfig — bundled with the deploy bundle.

  The App Service env var `FONTCONFIG_FILE=/home/site/wwwroot/server/fonts/fonts.conf`
  points fontconfig (and therefore every Chromium child process) at this file
  instead of the system default. This avoids the runtime-permissions problem
  we hit when trying to write `/etc/fonts/conf.d` (root-only) or
  `~/.config/fontconfig` (non-deterministic — `$HOME` was `/home` on App Service,
  with no writable subdir).

  Three things this file does:
    1. Pulls in the system-default conf.d (so we don't lose the platform's
       default font-rendering rules — antialias, hinting, etc.).
    2. Registers `/home/site/wwwroot/server/fonts/` so fontconfig finds the
       bundled Inter .otf/.ttf files.
    3. Aliases Tailwind's font-sans stack (system-ui, ui-sans-serif, the
       Apple-flavor families) to Inter — the missing piece on Linux.

  cachedir is `/tmp/fontconfig-cache` because the default
  (`/var/cache/fontconfig`) requires root to populate. `/tmp` is always
  writable in the App Service Linux container.
-->
<fontconfig>
  <include ignore_missing="yes">/etc/fonts/conf.d</include>

  <dir>/home/site/wwwroot/server/fonts</dir>
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>

  <cachedir>/tmp/fontconfig-cache</cachedir>

  <alias binding="strong"><family>system-ui</family><prefer><family>Inter</family></prefer></alias>
  <alias binding="strong"><family>ui-sans-serif</family><prefer><family>Inter</family></prefer></alias>
  <alias binding="strong"><family>-apple-system</family><prefer><family>Inter</family></prefer></alias>
  <alias binding="strong"><family>BlinkMacSystemFont</family><prefer><family>Inter</family></prefer></alias>
  <alias binding="strong"><family>SF Pro</family><prefer><family>Inter</family></prefer></alias>
  <alias binding="strong"><family>SF Pro Display</family><prefer><family>Inter</family></prefer></alias>
  <alias binding="strong"><family>SF Pro Text</family><prefer><family>Inter</family></prefer></alias>
  <alias binding="weak"><family>sans-serif</family><prefer><family>Inter</family></prefer></alias>
</fontconfig>
